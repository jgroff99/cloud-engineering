<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>URL Shortener</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 80px auto; padding: 0 20px; }
    input { width: 100%; padding: 10px; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    #result { margin-top: 20px; font-size: 18px; }
    a { color: #0073bb; }
  </style>
</head>
<body>
  <h1>URL Shortener</h1>
  <input type="text" id="longUrl" placeholder="Paste your long URL here..." />
  <button onclick="shorten()">Shorten</button>
  <div id="result"></div>

  <script>
    async function shorten() {
      const longUrl = document.getElementById('longUrl').value;
      const res = await fetch('https://1oega82hxf.execute-api.us-east-2.amazonaws.com/prod/shorten', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ longUrl })
      });
      const data = await res.json();
      const shortUrl = `https://1oega82hxf.execute-api.us-east-2.amazonaws.com/prod/${data.shortUrl}`;
      document.getElementById('result').innerHTML = 
        `Short URL: <a href="${shortUrl}" target="_blank">${shortUrl}</a>`;
    }
  </script>
</body>
</html>
